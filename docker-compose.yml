version: '3.8'

services:
  omotg:
    build: .
    image: omotg:latest
    container_name: omotg
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
      - "127.0.0.1:9090:9090"
    volumes:
      - ~/.config/omotg:/root/.config/omotg:ro
    environment:
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
